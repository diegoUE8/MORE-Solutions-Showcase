<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORE - Solutions Showcase</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Web 4.0 Components -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Figtree', 'sans-serif'],
                        article: ['Inter', 'sans-serif'] // For the readable drawer
                    },
                    colors: {
                        dark: '#050505',
                        bgcolor: '#2b2875', 
                        primary: '#5b57d9',
                        secondary: '#b9bddb',
                        accent: '#00c3ff',
                        surface: '#111111'
                    }
                }
            }
        }
    </script>

    <style>
        body { margin:0; padding:0; overflow:hidden; background-color: #050505; color: white; }
        
        /* The fixed background area that changes on hover */
        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background-color: #2b2875; 
            transition: background-color 0.8s ease;
        }

        #dynamic-media-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
            mix-blend-mode: luminosity;
        }

        #dynamic-media-container video, 
        #dynamic-media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.3) saturate(0.8); 
        }
        
        /* Gradient overlay */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(5,5,5,0.98) 0%, rgba(43,40,117,0.7) 40%, rgba(5,5,5,0.3) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* 
         * SPLIT SCREEN LAYOUT 
         */
        #ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* LEFT SIDEBAR */
        #left-sidebar {
            width: clamp(300px, 25vw, 400px);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 2rem 6rem 2rem; /* Extra bottom padding to prevent monitor cutoff */
            border-right: 1px solid rgba(255,255,255,0.05);
            background: rgba(5,5,5,0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-shrink: 0;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
        }
        #left-sidebar::-webkit-scrollbar { display: none; }

        .cat-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.75rem 0;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            position: relative;
        }

        .cat-btn:hover { color: rgba(255,255,255,0.8); padding-left: 0.5rem; }
        .cat-btn.active { color: #ffffff; padding-left: 1rem; }
        .cat-btn.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* Hover Info Box */
        #hover-info-box {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        #hover-info-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* RIGHT MAIN VIEW */
        #right-content {
            flex-grow: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 3rem;
            -ms-overflow-style: none;  
            scrollbar-width: none;  
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #right-content::-webkit-scrollbar { display: none; }

        #right-content-inner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100%;
            padding: 10vh 0;
        }

        .typo-item {
            display: block;
            position: relative;
            padding: 1.25rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            transform-origin: left center;
        }

        .typo-item:hover {
            color: #ffffff;
            padding-left: 2rem;
            border-bottom-color: rgba(255,255,255,0.5);
            transform: scale(1.02);
        }

        .typo-title {
            font-size: clamp(1.8rem, 2.5vw, 3.2rem);
            font-weight: 800;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .read-case-study {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            margin-top: 0.5rem;
        }
        
        .typo-item:hover .read-case-study {
            opacity: 1;
            transform: translateX(0);
        }

        /* ======================== 
           THE DRAWER (READABILITY) 
           ======================== */
        #case-study-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: calc(100vw - clamp(300px, 25vw, 400px)); /* Perfectly docks to the Left Sidebar! */
            height: 100vh;
            background: #0f1016; /* Solid dark background */
            z-index: 50;
            transform: translateX(100%);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: -20px 0 50px rgba(0,0,0,0.5);
            border-left: 1px solid rgba(255,255,255,0.05); /* Sleek separator line */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #case-study-drawer.open {
            transform: translateX(0);
        }

        /* Dim overlay behind drawer */
        #drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 40;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }
        #drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        /* Drawer internal scroll area */
        .drawer-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 4rem;
            font-family: 'Inter', sans-serif;
        }
        
        .drawer-content::-webkit-scrollbar { width: 6px; }
        .drawer-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* Typography for reading inside drawer */
        .drawer-content h2 { font-family: 'Figtree', sans-serif; font-size: 3rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.1; }
        .drawer-content h3 { font-family: 'Figtree', sans-serif; font-size: 1.5rem; color: var(--primary); margin: 3rem 0 1rem; font-weight: 700; }
        .drawer-content p { font-size: 1.1rem; line-height: 1.8; color: #a1a1aa; margin-bottom: 2rem; }
        
        .metric-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 60;
        }
        .close-btn:hover { background: rgba(255,255,255,0.2); }

        /* Media */
        @media (max-width: 1024px) {
            body { overflow: auto; }
            #ui-layer { display: block; height: auto; min-height: 100vh; }
            #left-sidebar { width: 100%; height: auto; border-right: none; padding: 1.5rem; }
            #right-content { width: 100%; height: auto; overflow: visible; padding: 1.5rem; }
            #case-study-drawer { width: 100%; }
            .drawer-content { padding: 2rem; }
            .drawer-content h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Dynamic Background Layer -->
    <div id="dynamic-bg">
        <div id="dynamic-media-container"></div>
    </div>
    <div class="gradient-overlay"></div>

    <!-- UI Overlay (Split Screen) -->
    <div id="ui-layer">
        
        <!-- Left Sidebar -->
        <aside id="left-sidebar">
            <div>
                <!-- Logo -->
                <a href="#" class="block w-28 md:w-36 mb-6">
                    <img src="loghi/logo.png" alt="MORE Logo" class="w-full h-auto object-contain">
                </a>
                
                <!-- Page Title -->
                <div class="mb-8">
                    <h2 class="font-extrabold text-white tracking-tight mb-1" style="font-family: 'Inter', sans-serif; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em;">XR SOLUTIONS</h2>
                    <p class="text-[0.75rem] text-secondary font-light tracking-wide italic leading-snug">Enterprise XR applications and custom development</p>
                </div>
                
                <!-- Category Navigation -->
                <h4 class="text-[0.65rem] font-bold text-primary uppercase tracking-[0.2em] mb-4">Core Expertise</h4>
                <nav id="cat-list" class="space-y-1">
                    <button class="cat-btn active" data-filter="all">All Projects</button>
                    <button class="cat-btn" data-filter="Training">Industrial & Workforce</button>
                    <button class="cat-btn" data-filter="Healthcare">Healthcare & Rehab</button>
                    <button class="cat-btn" data-filter="ArchViz">Architecture & Building</button>
                    <button class="cat-btn" data-filter="Museum">Museums & Heritage</button>
                    <button class="cat-btn" data-filter="R&D">Research & Innovation</button>
                    <button class="cat-btn" data-filter="Gaming">Gaming & Interactive</button>
                    <button class="cat-btn" data-filter="Playground">Interactive Web Showcases</button>
                </nav>
            </div>

            <!-- Dynamic Info Box -->
            <div id="hover-info-box" class="pt-8 mt-auto hidden lg:block">
                <div class="w-12 h-[2px] bg-primary mb-4"></div>
                <div id="hover-tags" class="flex flex-wrap gap-2 mb-3"></div>
                <h3 id="hover-title" class="text-xl font-bold text-white mb-2 leading-tight">Esplora le Soluzioni</h3>
                <p id="hover-desc" class="text-secondary font-light text-sm leading-relaxed">
                    Scorri i nostri Case Study a destra per scoprire come trasformiamo i processi industriali in valore misurabile.
                </p>
                <div class="mt-4 flex items-center text-xs font-semibold text-accent uppercase tracking-widest opacity-0 transition-opacity" id="hover-click-hint">
                    Apri Case Study ->
                </div>
            </div>
        </aside>

        <!-- Right Main View -->
        <main id="right-content">
            <div id="right-content-inner">
                <div class="flex flex-col w-full max-w-5xl" id="typo-list">
                    <!-- JS Inject -->
                </div>
            </div>
        </main>
    </div>

    <!-- THE DRAWER OVERLAY & PANEL -->
    <div id="drawer-overlay"></div>
    <div id="case-study-drawer">
        <div class="close-btn" id="closeDrawerBtn">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </div>
        
        <!-- Drawer content injected via JS -->
        <div class="drawer-content" id="drawer-content-area"></div>
    </div>

    <!-- FULLSCREEN PLAYGROUND OVERLAY -->
    <div id="fullscreen-playground" class="fixed inset-0 z-[100] bg-dark hidden flex-col opacity-0 transition-opacity duration-500">
        <div class="h-16 bg-[#0f1016] border-b border-white/10 flex items-center justify-between px-6 shadow-xl z-[101]">
            <div class="text-white font-bold tracking-widest uppercase flex items-center gap-4 text-sm">
                <span class="w-2 h-2 rounded-full bg-accent shadow-[0_0_10px_#00c3ff]"></span> <span id="fs-title">Live Demo</span>
            </div>
            <button id="closeFsBtn" class="text-white hover:text-accent transition-colors flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
                Chiudi <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="flex-grow relative w-full h-full bg-black flex items-center justify-center p-0" id="fs-content">
            <!-- Iframe injected here -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
